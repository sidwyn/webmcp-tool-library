<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#612D53"/>
      <stop offset="100%" stop-color="#3A2B38"/>
    </linearGradient>
    <linearGradient id="planeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3F4F4"/>
      <stop offset="100%" stop-color="#D0C8CC"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B04A6A"/>
      <stop offset="100%" stop-color="#853953"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feFlood flood-color="#1a1118" flood-opacity="0.3"/>
      <feComposite operator="in" in2="A"/>
      <feComposite operator="over" in="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner border -->
  <rect x="6" y="6" width="116" height="116" rx="24" ry="24" fill="none" stroke="#F3F4F4" stroke-opacity="0.08" stroke-width="1"/>
  
  <!-- Flight path arc (dotted) -->
  <path d="M 28 88 Q 44 36, 82 42 Q 96 44, 100 56" 
        fill="none" stroke="#853953" stroke-width="2.5" stroke-dasharray="4,4" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Destination pin -->
  <circle cx="100" cy="56" r="5" fill="#853953" opacity="0.9"/>
  <circle cx="100" cy="56" r="2" fill="#F3F4F4" opacity="0.8"/>
  
  <!-- Origin dot -->
  <circle cx="28" cy="88" r="4" fill="#853953" opacity="0.6"/>
  
  <!-- Airplane — stylized, angled, flying along the path -->
  <g transform="translate(58, 52) rotate(-32)" filter="url(#glow)">
    <!-- Fuselage -->
    <path d="M -4 0 L 18 0 L 22 -1.5 L 22 1.5 L 18 0" fill="url(#planeGrad)"/>
    <!-- Main body -->
    <ellipse cx="6" cy="0" rx="14" ry="3.2" fill="url(#planeGrad)"/>
    <!-- Wings -->
    <path d="M 2 -2.5 L -4 -14 L 0 -14 L 10 -2.5 Z" fill="url(#planeGrad)" opacity="0.95"/>
    <path d="M 2 2.5 L -4 14 L 0 14 L 10 2.5 Z" fill="url(#planeGrad)" opacity="0.95"/>
    <!-- Tail fin -->
    <path d="M -10 -1.5 L -16 -8 L -12 -8 L -8 -1.5 Z" fill="url(#planeGrad)" opacity="0.9"/>
    <path d="M -10 1.5 L -14 6 L -11 6 L -8 1.5 Z" fill="url(#planeGrad)" opacity="0.7"/>
    <!-- Engine glow -->
    <ellipse cx="-12" cy="0" rx="3" ry="1.2" fill="#B04A6A" opacity="0.5"/>
  </g>
  
  <!-- MCP bracket/tool symbol — small, bottom right corner -->
  <g transform="translate(86, 82)">
    <!-- Left bracket -->
    <path d="M 0 0 L -5 0 L -5 18 L 0 18" fill="none" stroke="url(#accentGrad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket -->
    <path d="M 20 0 L 25 0 L 25 18 L 20 18" fill="none" stroke="url(#accentGrad)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dots inside brackets (tool/function indicator) -->
    <circle cx="5" cy="5" r="1.8" fill="#F3F4F4" opacity="0.85"/>
    <circle cx="10" cy="9" r="1.8" fill="#F3F4F4" opacity="0.85"/>
    <circle cx="15" cy="13" r="1.8" fill="#F3F4F4" opacity="0.85"/>
  </g>
</svg>
